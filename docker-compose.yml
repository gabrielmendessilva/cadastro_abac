services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ged_app
    restart: unless-stopped
    volumes:
      - .env:/var/www/.env
      - storage_data:/var/www/storage
    networks:
      - ged_network

  nginx:
    image: nginx:1.25-alpine
    container_name: ged_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
      - storage_data:/var/www/storage
    depends_on:
      - app
    networks:
      - ged_network

volumes:
  storage_data:

networks:
  ged_network:
    driver: bridge
